<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ghost — Private AI Agent</title>
  <meta name="description" content="Private AI-powered trading agent on Aleo">
  <meta name="theme-color" content="#7c7cff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ghost">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/ghost-192.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1a1a2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
    }
    header .tag {
      font-size: 11px;
      background: #1a1a2e;
      color: #7c7cff;
      padding: 2px 8px;
      border-radius: 4px;
    }
    #install-banner {
      display: none;
      padding: 10px 24px;
      background: #1a1a3e;
      border-bottom: 1px solid #2a2a4e;
      font-size: 13px;
      color: #b0b0ff;
      cursor: pointer;
      text-align: center;
    }
    #install-banner:hover { background: #2a2a4e; }
    #wallet-bar {
      padding: 8px 24px;
      font-size: 12px;
      color: #666;
      border-bottom: 1px solid #1a1a2e;
      display: none;
    }
    #wallet-bar code {
      color: #7c7cff;
      font-size: 11px;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1a1a3e;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #141420;
      border: 1px solid #1a1a2e;
      border-bottom-left-radius: 4px;
    }
    .msg .buttons {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }
    .msg button {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .msg button.confirm {
      background: #2d6a4f;
      color: #fff;
    }
    .msg button.cancel {
      background: #3a1a1a;
      color: #f88;
    }
    #input-area {
      padding: 16px 24px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      border-top: 1px solid #1a1a2e;
      display: flex;
      gap: 12px;
    }
    #input-area input {
      flex: 1;
      padding: 10px 14px;
      background: #141420;
      border: 1px solid #1a1a2e;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    #input-area input:focus {
      border-color: #7c7cff;
    }
    #input-area button {
      padding: 10px 20px;
      background: #7c7cff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
    }
    #status {
      position: fixed;
      top: 16px;
      right: 24px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f44;
    }
    #status.connected { background: #4f4; }
  </style>
</head>
<body>
  <header>
    <h1>Ghost</h1>
    <span class="tag">Private AI Agent on Aleo</span>
    <div id="status"></div>
  </header>
  <div id="install-banner" onclick="installPwa()">Install Ghost as an app for quick access</div>
  <div id="wallet-bar">Wallet: <code id="wallet-addr"></code></div>
  <div id="chat"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Type a command... (e.g. buy 100 ALEO)" autocomplete="off" />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const status = document.getElementById('status');
    const walletBar = document.getElementById('wallet-bar');
    const walletAddr = document.getElementById('wallet-addr');
    let ws;
    let deferredPrompt = null;

    // Restore last response from cache on load (offline support)
    const cachedMessages = JSON.parse(localStorage.getItem('ghost_messages') || '[]');
    for (const m of cachedMessages.slice(-20)) {
      addMessage(m.text, m.sender, true);
    }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);

      ws.onopen = () => {
        status.classList.add('connected');
        ws.send(JSON.stringify({ type: 'start' }));
      };

      ws.onclose = () => {
        status.classList.remove('connected');
        setTimeout(connect, 2000);
      };

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);

        if (data.type === 'wallet') {
          walletBar.style.display = 'block';
          walletAddr.textContent = data.address;
          return;
        }

        if (data.type === 'response') {
          addMessage(data.message, 'bot');
          return;
        }

        if (data.type === 'confirm') {
          addConfirmMessage(data.message, data.key);
          return;
        }

        if (data.type === 'error') {
          addMessage(data.message, 'bot');
        }
      };
    }

    function cacheMessage(text, sender) {
      const messages = JSON.parse(localStorage.getItem('ghost_messages') || '[]');
      messages.push({ text, sender, ts: Date.now() });
      // Keep last 50 messages
      if (messages.length > 50) messages.splice(0, messages.length - 50);
      localStorage.setItem('ghost_messages', JSON.stringify(messages));
    }

    function addMessage(text, sender, skipCache) {
      const div = document.createElement('div');
      div.className = `msg ${sender}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      if (!skipCache) cacheMessage(text, sender);
    }

    function addConfirmMessage(text, key) {
      const div = document.createElement('div');
      div.className = 'msg bot';
      div.textContent = text;

      const buttons = document.createElement('div');
      buttons.className = 'buttons';

      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'confirm';
      confirmBtn.textContent = 'Confirm';
      confirmBtn.onclick = () => {
        ws.send(JSON.stringify({ type: 'confirm', key }));
        buttons.remove();
      };

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'cancel';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = () => {
        ws.send(JSON.stringify({ type: 'cancel', key }));
        buttons.remove();
      };

      buttons.appendChild(confirmBtn);
      buttons.appendChild(cancelBtn);
      div.appendChild(buttons);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      cacheMessage(text, 'bot');
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      ws.send(JSON.stringify({ type: 'message', text }));
      input.value = '';
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // PWA install prompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').style.display = 'block';
    });

    function installPwa() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('install-banner').style.display = 'none';
      });
    }

    window.addEventListener('appinstalled', () => {
      document.getElementById('install-banner').style.display = 'none';
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }

    connect();
  </script>
</body>
</html>
